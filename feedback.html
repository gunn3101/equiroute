<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EquiRoute — Feedback</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --text:         #2a2520;
      --sub:          #7a746a;
      --accent:       #7c6f5a;
      --accent-dark:  #5c5244;
      --accent-glow:  rgba(124,111,90,0.22);
      --glass-bg:     rgba(220, 215, 205, 0.38);
      --glass-border: rgba(200, 192, 175, 0.55);
      --glass-input:  rgba(245, 243, 238, 0.45);
      --green:        #2e7d4f;
      --red:          #c0392b;
      --radius:       12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Sora', sans-serif;
      color: var(--text);
      position: relative;
      height: 100vh;
    }

    /* ── MAP BG ── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
      filter: saturate(0.65) brightness(1.05);
    }

    #vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center,
        rgba(235,228,214,0.1) 0%,
        rgba(200,196,188,0.42) 60%,
        rgba(170,166,158,0.60) 100%
      );
      pointer-events: none;
    }

    /* ── CORNER LOGO ── */
    #corner {
      position: absolute;
      top: 22px; left: 22px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--glass-bg);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: 0 4px 16px rgba(60,50,30,0.1), inset 0 1px 0 rgba(255,255,255,0.55);
      text-decoration: none;
    }

    .corner-icon {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #7c6f5a, #a0906e);
      border-radius: 7px;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 8px rgba(80,60,30,0.3);
      flex-shrink: 0;
    }

    .corner-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── MAIN LAYOUT ── */
    #page {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── GLASS CARD ── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 36px 36px 32px;
      box-shadow:
        0 12px 48px rgba(60,50,30,0.18),
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 -1px 0 rgba(0,0,0,0.03);
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.7s ease 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD HEADER ── */
    .card-head {
      margin-bottom: 28px;
    }

    .card-eyebrow {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-eyebrow::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--accent);
      display: block;
    }

    .card-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .card-desc {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 300;
      color: var(--sub);
      line-height: 1.6;
    }

    /* ── FORM ── */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .field label {
      display: block;
      font-size: 10.5px;
      font-weight: 500;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 10px 13px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      background: var(--glass-input);
      border: 1px solid rgba(180,168,148,0.5);
      border-radius: 9px;
      outline: none;
      appearance: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
      resize: none;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: rgba(122,116,106,0.5); }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      background: rgba(248,246,242,0.75);
      box-shadow: 0 0 0 3px var(--accent-glow), inset 0 1px 2px rgba(0,0,0,0.03);
    }

    .field select option { background: #dddad2; color: var(--text); }

    .sel-wrap { position: relative; }
    .sel-wrap::after {
      content: '';
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--sub);
      pointer-events: none;
    }

    /* ── STAR RATING ── */
    .stars-wrap {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .star {
      font-size: 26px;
      cursor: pointer;
      color: rgba(180,168,148,0.5);
      transition: color 0.15s, transform 0.15s;
      line-height: 1;
      user-select: none;
    }

    .star:hover,
    .star.active { color: #c96a1a; }

    .star:hover { transform: scale(1.15); }

    /* ── SUBMIT ── */
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c6f5a, #9c8a6e);
      color: #f8f4ec;
      border: none;
      border-radius: 9px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 3px 12px rgba(80,60,30,0.28), inset 0 1px 0 rgba(255,255,255,0.15);
      margin-top: 4px;
    }
    .submit-btn:hover { opacity: 0.88; box-shadow: 0 5px 18px rgba(80,60,30,0.38); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── SUCCESS STATE ── */
    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px 0 12px;
      gap: 16px;
    }

    .success-icon {
      width: 56px; height: 56px;
      background: rgba(46,125,79,0.1);
      border: 1px solid rgba(46,125,79,0.3);
      border-radius: 50%;
      display: grid;
      place-items: center;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .success-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .success-sub {
      font-size: 13px;
      font-weight: 300;
      color: var(--sub);
      line-height: 1.6;
      max-width: 320px;
    }

    .back-btn {
      margin-top: 8px;
      padding: 9px 22px;
      background: transparent;
      border: 1px solid rgba(180,168,148,0.5);
      border-radius: 9px;
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .back-btn:hover { background: rgba(245,243,238,0.55); border-color: var(--accent); color: var(--accent-dark); }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      background: linear-gradient(135deg, #7c6f5a, #9c8a6e);
      border: none;
      border-radius: 9px;
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #f8f4ec;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 3px 12px rgba(80,60,30,0.28), inset 0 1px 0 rgba(255,255,255,0.15);
      margin-top: 8px;
    }
    .home-btn:hover { opacity: 0.88; }
    .home-btn:active { transform: scale(0.98); }

    /* ── DIVIDER ── */
    hr.div { border: none; border-top: 1px solid rgba(180,168,148,0.35); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(180,168,148,0.4); border-radius: 3px; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      width: 13px; height: 13px;
      border: 2px solid rgba(248,244,236,0.3);
      border-top-color: #f8f4ec;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    /* Leaflet attribution */
    .leaflet-control-attribution {
      background: rgba(215,210,200,0.45) !important;
      backdrop-filter: blur(8px) !important;
      color: var(--sub) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--accent) !important; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="vignette"></div>

<a id="corner" href="index.html">
  <div class="corner-icon">
    <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
      <circle cx="7.5" cy="7.5" r="5.5" stroke="#f8f4ec" stroke-width="1.5"/>
      <path d="M7.5 4.5v3l2.2 1.6" stroke="#f8f4ec" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <span class="corner-text">EquiRoute</span>
</a>

<div id="page">
  <div class="card">

    <!-- FORM VIEW -->
    <div id="formView">
      <div class="card-head">
        <div class="card-eyebrow">Team Spectre</div>
        <div class="card-title">Share your feedback</div>
        <div class="card-desc">Help us improve EquiRoute. Your thoughts matter — takes less than a minute.</div>
      </div>

      <div class="form">
        <div class="row-2">
          <div class="field">
            <label>Name</label>
            <input id="inp-name" type="text" placeholder="Your name" />
          </div>
          <div class="field">
            <label>Role</label>
            <div class="sel-wrap">
              <select id="inp-role">
                <option value="" disabled selected>Select role</option>
                <option>Student</option>
                <option>Researcher</option>
                <option>Urban Planner</option>
                <option>NGO / Govt</option>
                <option>Developer</option>
                <option>Other</option>
              </select>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Overall Experience</label>
          <div class="stars-wrap" id="stars">
            <span class="star" data-v="1">★</span>
            <span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span>
            <span class="star" data-v="4">★</span>
            <span class="star" data-v="5">★</span>
          </div>
        </div>

        <div class="field">
          <label>What did you use it for?</label>
          <div class="sel-wrap">
            <select id="inp-use">
              <option value="" disabled selected>Select use case</option>
              <option>Medical Access Analysis</option>
              <option>Education Gap Mapping</option>
              <option>Evacuation Planning</option>
              <option>Research / Academic</option>
              <option>Just Exploring</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Your Feedback</label>
          <textarea id="inp-msg" rows="4" placeholder="Tell us what you liked, what can be improved, or any feature requests…"></textarea>
        </div>

        <hr class="div" />

        <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
          <span id="btnContent">Submit Feedback</span>
        </button>
      </div>
    </div>

    <!-- SUCCESS VIEW -->
    <div class="success-state" id="successView">
      <div class="success-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <path d="M6 13.5l5 5 9-9" stroke="#2e7d4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="success-title">Thank you!</div>
      <div class="success-sub">Your feedback has been recorded. Team Spectre appreciates every response — it helps us build EquiRoute better.</div>
      <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;">
        <button class="back-btn" onclick="resetForm()">Submit another</button>
        <a class="home-btn" href="spectre-intro.html">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path d="M2 6.5L8 1.5l6 5V14a.5.5 0 01-.5.5h-4V10h-3v4.5h-4A.5.5 0 012 14V6.5z" stroke="#f8f4ec" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
          Return to Home
        </a>
      </div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── MAP ───────────────────────────────────────────────────────────────────
  const map = L.map('map', {
    zoomControl: false, attributionControl: true,
    dragging: false, scrollWheelZoom: false,
    doubleClickZoom: false, keyboard: false
  }).setView([19.076, 72.8777], 12);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com">CARTO</a> © <a href="https://openstreetmap.org">OSM</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);

  // Ambient pan
  let angle = 0;
  function pan() {
    angle += 0.0005;
    map.setView([19.076 + Math.sin(angle) * 0.014, 72.8777 + Math.cos(angle * 0.8) * 0.018], 12, { animate: true, duration: 2 });
    setTimeout(pan, 2000);
  }
  setTimeout(pan, 1500);

  // ── STAR RATING ───────────────────────────────────────────────────────────
  let rating = 0;
  const stars = document.querySelectorAll('.star');

  stars.forEach(star => {
    star.addEventListener('mouseenter', () => {
      const v = +star.dataset.v;
      stars.forEach(s => s.classList.toggle('active', +s.dataset.v <= v));
    });
    star.addEventListener('mouseleave', () => {
      stars.forEach(s => s.classList.toggle('active', +s.dataset.v <= rating));
    });
    star.addEventListener('click', () => {
      rating = +star.dataset.v;
      stars.forEach(s => s.classList.toggle('active', +s.dataset.v <= rating));
    });
  });

  // ── SUBMIT ────────────────────────────────────────────────────────────────
  async function handleSubmit() {
    const name = document.getElementById('inp-name').value.trim();
    const msg  = document.getElementById('inp-msg').value.trim();

    if (!name) { shake('inp-name'); return; }
    if (!rating) { shake('stars'); return; }
    if (!msg)  { shake('inp-msg');  return; }

    const btn  = document.getElementById('submitBtn');
    const btnC = document.getElementById('btnContent');
    btn.disabled = true;
    btnC.innerHTML = '<span class="spin"></span> Submitting…';

    await new Promise(r => setTimeout(r, 1000));

    document.getElementById('formView').style.display   = 'none';
    const sv = document.getElementById('successView');
    sv.style.display = 'flex';
    sv.style.animation = 'fadeUp 0.5s ease forwards';

    btn.disabled = false;
    btnC.textContent = 'Submit Feedback';
  }

  function shake(id) {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.35s ease';
  }

  function resetForm() {
    rating = 0;
    stars.forEach(s => s.classList.remove('active'));
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-role').selectedIndex = 0;
    document.getElementById('inp-use').selectedIndex  = 0;
    document.getElementById('inp-msg').value  = '';
    document.getElementById('formView').style.display  = 'block';
    document.getElementById('successView').style.display = 'none';
  }
</script>

<style>
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-5px); }
    40%     { transform: translateX(5px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
</style>
</body>
</html>
